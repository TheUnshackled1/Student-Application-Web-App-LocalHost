databases:
  - name: student-assistant-db
    plan: free
    databaseName: student_assistant_db

services:
  - type: web
    name: swa-application
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn student_application.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: student-assistant-db
          property: connectionString
      - key: SITE_URL
        value: "https://swa-application.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.3"
